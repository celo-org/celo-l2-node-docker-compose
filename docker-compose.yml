services:
  historical-rpc-node:
    image: us-docker.pkg.dev/celo-org/us.gcr.io/geth-all:1.8.9
    restart: on-failure
    stop_grace_period: 5m
    entrypoint: /scripts/start-historical-rpc-node.sh
    env_file:
      - ./envs/common/historical-rpc-node.env
      - .env
    volumes:
      - ${HISTORICAL_RPC_DATADIR_PATH:-geth}:/geth
      - ./scripts/:/scripts/
    ports:
      - ${PORT__HISTORICAL_RPC_NODE_HTTP:-9991}:8545
      - ${PORT__HISTORICAL_RPC_NODE_WS:-9992}:8546

  healthcheck:
    platform: linux/amd64
    image: ethereumoptimism/replica-healthcheck:${IMAGE_TAG__HEALTHCHECK:-latest}
    restart: on-failure
    entrypoint: /opt/optimism/packages/replica-healthcheck/start-healthcheck.sh
    env_file:
      - ./envs/common/healthcheck.env
      - .env
    volumes:
      - ./scripts/start-healthcheck.sh:/opt/optimism/packages/replica-healthcheck/start-healthcheck.sh
    ports:
      - ${PORT__HEALTHCHECK_METRICS:-7300}:7300

  eigenda-proxy:
    platform: linux/amd64
    image: ghcr.io/layr-labs/eigenda-proxy:v2.6.0
    restart: on-failure
    stop_grace_period: 5m
    entrypoint: /scripts/start-eigenda-proxy.sh
    env_file:
      - .env
    volumes:
      - eigenda-data:/data
      - ./scripts/:/scripts
    ports:
      - ${PORT_EIGENDA_PROXY:-4242}:4242
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # One-shot datadir initialization for op-reth. On first start (an empty
  # datadir) it downloads a pre-synced snapshot so op-reth does not have to sync
  # from scratch. op-reth waits for this to complete successfully before
  # starting. Uses debian-slim because the op-reth image lacks the download and
  # decompression tooling.
  op-reth-init:
    platform: linux/amd64
    image: debian:bookworm-slim
    restart: "no"
    entrypoint: /scripts/init-op-reth.sh
    env_file:
      - ./envs/${NETWORK_NAME}/op-reth.env
      - .env
    volumes:
      - ./scripts/:/scripts
      - ${DATADIR_PATH}:/reth

  op-reth:
    platform: linux/amd64
    image: us-west1-docker.pkg.dev/devopsre/dev-images/celo-kona-reth:${IMAGE_TAG__OP_RETH:-latest}
    restart: on-failure
    stop_grace_period: 5m
    entrypoint: /scripts/start-op-reth.sh
    env_file:
      - ./envs/${NETWORK_NAME}/op-reth.env
      - .env
    volumes:
      - ./scripts/:/scripts
      - shared:/shared
      - ${DATADIR_PATH}:/reth
    ports:
      - ${PORT__OP_RETH_HTTP:-9993}:8545
      - ${PORT__OP_RETH_WS:-9994}:8546
      - ${PORT__OP_RETH_P2P:-30303}:${PORT__OP_RETH_P2P:-30303}/udp
      - ${PORT__OP_RETH_P2P:-30303}:${PORT__OP_RETH_P2P:-30303}/tcp
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      op-reth-init:
        condition: service_completed_successfully

  op-node:
    platform: linux/amd64
    image: us-west1-docker.pkg.dev/devopsre/celo-blockchain-public/op-node:celo-v2.2.1
    restart: on-failure
    stop_grace_period: 5m
    entrypoint: /scripts/start-op-node.sh
    env_file:
      - ./envs/${NETWORK_NAME}/op-node.env
      - .env
    volumes:
      - ./envs/${NETWORK_NAME}/config:/chainconfig
      - ./scripts/:/scripts
      - shared:/shared
    ports:
      - ${PORT__OP_NODE_P2P:-9222}:9222/udp
      - ${PORT__OP_NODE_P2P:-9222}:9222/tcp
      - ${PORT__OP_NODE_HTTP:-9545}:9545
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      op-reth:
        condition: service_started

  challenger:
    platform: linux/amd64
    image: us-west1-docker.pkg.dev/devopsre/celo-blockchain-public/op-succinct-challenger:${IMAGE_TAG__CHALLENGER:-v2}
    restart: on-failure
    stop_grace_period: 5m
    entrypoint: /scripts/start-challenger.sh
    env_file:
      - ./envs/${NETWORK_NAME}/challenger.env
    volumes:
      - ./scripts/:/scripts
    environment:
      - CHALLENGER_ENABLED=${CHALLENGER__ENABLED}
      - L1_RPC=${OP_NODE__RPC_ENDPOINT}
      - L2_RPC=http://op-reth:8545
      - PRIVATE_KEY=${CHALLENGER__PRIVATE_KEY}
      - FETCH_INTERVAL=${CHALLENGER__FETCH_INTERVAL_SECONDS:-30}
      - DISABLE_MONITOR_ONLY=${CHALLENGER__DISABLE_MONITOR_ONLY_MODE:-false}
      - TX_CONFIRMATION_TIMEOUT=${CHALLENGER__TX_CONFIRMATION_TIMEOUT_SECONDS:-180}
      - CHALLENGER_METRICS_PORT=7300
    expose: # only informative
      - "7300" # metrics
    extra_hosts:
      - "host.docker.internal:host-gateway"

  prometheus:
    platform: linux/amd64
    image: prom/prometheus:${IMAGE_TAG__PROMETHEUS:-latest}
    restart: on-failure
    entrypoint: /scripts/start-prometheus.sh
    env_file:
      - .env
    volumes:
      - ./docker/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
      - ./scripts/start-prometheus.sh:/scripts/start-prometheus.sh
    ports:
      - ${PORT__PROMETHEUS:-9090}:9090

  grafana:
    platform: linux/amd64
    image: grafana/grafana:${IMAGE_TAG__GRAFANA:-9.3.0}
    restart: on-failure
    entrypoint: /scripts/start-grafana.sh
    env_file:
      - ./envs/common/grafana.env
      - .env
    volumes:
      - ./docker/grafana/provisioning/:/etc/grafana/provisioning/:ro
      - ./docker/grafana/dashboards/simple_node_dashboard.json:/var/lib/grafana/dashboards/simple_node_dashboard.json
      - ./docker/grafana/dashboards/challenger_dashboard.json:/var/lib/grafana/dashboards/challenger_dashboard.json
      - grafana_data:/var/lib/grafana
      - ./scripts/start-grafana.sh:/scripts/start-grafana.sh
    ports:
      - ${PORT__GRAFANA:-3000}:3000

  influxdb:
    platform: linux/amd64
    image: influxdb:${IMAGE_TAG__INFLUXDB:-1.8}
    restart: on-failure
    entrypoint: /scripts/start-influxdb.sh
    env_file:
      - ./envs/common/influxdb.env
      - .env
    volumes:
      - ./docker/influxdb/influx_init.iql:/docker-entrypoint-initdb.d/influx_init.iql
      - influxdb_data:/var/lib/influxdb
      - ./scripts/start-influxdb.sh:/scripts/start-influxdb.sh
    ports:
      - ${PORT__INFLUXDB:-8086}:8086

volumes:
  geth:
  eigenda-data:
  prometheus_data:
  grafana_data:
  influxdb_data:
  shared:
